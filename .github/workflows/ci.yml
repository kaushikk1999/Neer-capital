name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Lint, build & E2E
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Cache Playwright browsers
        id: pw-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      - name: Install Playwright browsers
        if: steps.pw-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps chromium

      - name: Run E2E (chromium + mobile)
        run: npx playwright test --project=chromium --project=mobile

      - name: Upload Playwright report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14

      - name: Upload failure traces/screenshots/videos
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-failures
          path: test-results/
          retention-days: 14

  # Post-deploy verification. Runs only when Vercel secrets are configured.
  # Add repo secrets: VERCEL_TOKEN, VERCEL_ORG_ID, VERCEL_PROJECT_ID.
  preview-smoke:
    name: Deploy preview & smoke
    runs-on: ubuntu-latest
    needs: verify
    if: ${{ github.event_name == 'pull_request' }}
    env:
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - name: Guard — require Vercel token
        id: guard
        run: |
          if [ -z "$VERCEL_TOKEN" ]; then
            echo "No VERCEL_TOKEN configured — skipping preview smoke."
            echo "enabled=false" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/setup-node@v4
        if: steps.guard.outputs.enabled == 'true'
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        if: steps.guard.outputs.enabled == 'true'
        run: npm ci

      - name: Deploy preview to Vercel
        id: deploy
        if: steps.guard.outputs.enabled == 'true'
        run: |
          URL=$(npx vercel deploy --yes --token="$VERCEL_TOKEN")
          echo "url=$URL" >> "$GITHUB_OUTPUT"
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Smoke test the preview deployment
        if: steps.guard.outputs.enabled == 'true'
        run: npx playwright install chromium && npx playwright test --config=playwright.preview.config.ts
        env:
          PREVIEW_URL: ${{ steps.deploy.outputs.url }}
